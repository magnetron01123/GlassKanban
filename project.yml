name: GlassKanban
options:
  bundleIdPrefix: com.davidtrogemann
  deploymentTarget:
    macOS: "26.0"
settings:
  base:
    # Swift 5 language mode for the MVP: EventKit's callback APIs and
    # non-Sendable EKObjects make strict Swift 6 concurrency checking a
    # poor fit right now. Revisit after the data layer stabilizes.
    SWIFT_VERSION: "5.0"
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
targets:
  GlassKanban:
    type: application
    platform: macOS
    sources:
      - path: GlassKanban
    info:
      path: GlassKanban/Info.plist
      properties:
        # Must describe write access too: the board renames, moves, edits,
        # creates and deletes reminders. Understating this is a standard
        # 5.1.1 review rejection.
        NSRemindersFullAccessUsageDescription: >-
          Glass Kanban zeigt deine Erinnerungen als Kanban-Board an und liest
          sowie bearbeitet dafür deine Erinnerungen.
        NSHumanReadableCopyright: "© 2026 David Trogemann"
        LSApplicationCategoryType: public.app-category.productivity
        # Without these two the plist would carry XcodeGen's literal 1.0/1
        # defaults and MARKETING_VERSION would never reach the app — only the
        # test bundle, which never ships.
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        # No network code, no encryption of our own — declaring it here stops
        # App Store Connect asking the export-compliance question every upload.
        ITSAppUsesNonExemptEncryption: false
        # The app's own strings are German, but AppKit localizes the standard
        # menus (Bearbeiten, Darstellung, Fenster, Hilfe) from the bundle's
        # declared languages — without this it hands out English ones next to
        # German content.
        CFBundleDevelopmentRegion: de
        CFBundleLocalizations:
          - de
    entitlements:
      path: GlassKanban/GlassKanban.entitlements
      properties:
        com.apple.security.app-sandbox: true
        com.apple.security.personal-information.calendars: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.davidtrogemann.GlassKanban
        PRODUCT_NAME: Glass Kanban
        GENERATE_INFOPLIST_FILE: false
        # Local self-signed identity ("Glass Kanban Development" in the login
        # keychain): keeps the code signature stable across builds so macOS
        # remembers the Reminders permission instead of re-prompting.
        CODE_SIGN_STYLE: Manual
        CODE_SIGN_IDENTITY: Glass Kanban Development
  GlassKanbanTests:
    type: bundle.unit-test
    platform: macOS
    # Standalone logic tests: the pure-logic sources are compiled directly
    # into the test bundle, so no app host is needed to run them.
    sources:
      - path: GlassKanbanTests
      - path: GlassKanban/AppAppearance.swift
      - path: GlassKanban/Models.swift
      - path: GlassKanban/StatusTagger.swift
      - path: GlassKanban/TextSanitizer.swift
      - path: GlassKanban/StreakCalculator.swift
      - path: GlassKanban/BacklogTicketTargeting.swift
      - path: GlassKanban/TicketRename.swift
      - path: GlassKanban/WrappedStats.swift
      - path: GlassKanban/ReminderDeepLink.swift
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.davidtrogemann.GlassKanbanTests
        GENERATE_INFOPLIST_FILE: true
schemes:
  GlassKanban:
    build:
      targets:
        GlassKanban: all
        GlassKanbanTests: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - GlassKanbanTests
